<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="robots" content="noindex, nofollow, noarchive" />
  <title>Dell Discovery Canvas</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="styles.css" />
  <link rel="icon" type="image/svg+xml" href="./Logo/canvas-icon.svg" />
  <!-- PWA manifest. Registers Canvas as a handler for the .canvas file
       type so saved files show the app icon in the OS and can be opened
       by double-click after the app is installed. Optional for the web
       experience; required for OS file association. The path is relative
       so the manifest resolves correctly when served from a subpath. -->
  <link rel="manifest" href="./manifest.json" />
  <meta name="theme-color" content="#0078D4" />

  <!-- Import map for Zod (vendored at vendor/zod/zod.mjs). Must be
       parsed before any module script that resolves the bare "zod"
       specifier, so it lives in <head>. -->
  <script type="importmap">
    {
      "imports": {
        "zod": "./vendor/zod/zod.mjs"
      }
    }
  </script>
</head>
<body>

  <!-- 72px sticky header: brand block (logo + vertical divider + two-line
       brand text) | session meta strip (center) | actions (right: AI
       buttons + undo chips + gear). -->
  <header id="app-header" class="topbar">
    <div class="topbar-inner">
      <div class="brand">
        <img class="brand-logo" src="./Logo/delltech-logo-stk-blue-rgb.avif" alt="Dell Technologies" />
        <div class="brand-divider"></div>
        <div class="brand-text">
          <div class="t1">Discovery Canvas</div>
          <div class="t2">Solutions architecture workshop</div>
        </div>
      </div>
      <div class="session-strip-wrap" id="sessionMetaHeader" data-empty="true">
        <!-- Building icon (corporate office tower) for the session/account. -->
        <svg class="session-strip-icon" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor"
             stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
          <path d="M6 22V4a2 2 0 0 1 2-2h8a2 2 0 0 1 2 2v18Z"/>
          <path d="M6 12H4a2 2 0 0 0-2 2v8h4"/>
          <path d="M18 9h2a2 2 0 0 1 2 2v11h-4"/>
          <path d="M10 6h4"/>
          <path d="M10 10h4"/>
          <path d="M10 14h4"/>
          <path d="M10 18h4"/>
        </svg>
        <span class="session-strip-name">New session</span>
        <span class="session-strip-divider" aria-hidden="true"></span>
        <span class="session-strip-status">
          <span class="session-strip-dot" data-state="idle" aria-hidden="true"></span>
          <span class="session-strip-status-text">Empty canvas</span>
        </span>
        <!-- "Updated HH:MM" segment after the save indicator. -->
        <span class="session-strip-divider session-strip-divider-2" aria-hidden="true"></span>
        <span class="session-strip-updated" data-empty="true"></span>
      </div>
      <div class="topbar-actions">
        <!-- Topbar AI button. Opens Canvas Chat, the unified chat surface
             with right-rail saved-skill cards and an "Author new skill"
             affordance. Cmd/Ctrl+K opens it too. -->
        <button id="topbarAiBtn" class="topbar-ai-btn" type="button" aria-label="Open AI Assist">
          <svg class="topbar-ai-icon" width="14" height="14" viewBox="0 0 24 24" fill="none"
               stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
            <path d="M12 3l1.7 4.6L18 9.3l-4.3 1.7L12 15.6l-1.7-4.6L6 9.3l4.3-1.7L12 3z"/>
            <path d="M19 14l.8 2.2L22 17l-2.2.8L19 20l-.8-2.2L16 17l2.2-.8L19 14z"/>
            <path d="M5 16l.6 1.6L7.2 18l-1.6.4L5 20l-.6-1.6L2.8 18l1.6-.4L5 16z"/>
          </svg>
          <span class="topbar-ai-label">AI Assist</span>
        </button>
        <!-- Second topbar AI button. Opens the Workshop Notes overlay.
             AI Assist is conversational (Cmd+K); AI Notes is batched for
             workshop time (Cmd+Shift+N). -->
        <button id="topbarAiNotesBtn" class="topbar-ai-btn topbar-ai-notes-btn" type="button" aria-label="Open AI Notes">
          <svg class="topbar-ai-icon" width="14" height="14" viewBox="0 0 24 24" fill="none"
               stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
            <path d="M4 4a2 2 0 0 1 2-2h11a1 1 0 0 1 1 1v17a1 1 0 0 1-1 1H6a2 2 0 0 1-2-2V4z"/>
            <path d="M4 7h14"/>
            <path d="M4 11h14"/>
            <path d="M4 15h9"/>
          </svg>
          <span class="topbar-ai-label">AI Notes</span>
        </button>
        <button id="undoBtn" class="undo-chip" type="button" aria-label="Undo last AI change" style="display:none;">
          <svg class="undo-chip-icon" width="14" height="14" viewBox="0 0 16 16" fill="none" stroke="currentColor"
               stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
            <path d="M2 6V2.5h3.5"/>
            <path d="M2 6a6 6 0 1 0 1.8-4.2"/>
          </svg>
          <span>Undo last AI change</span>
          <span id="undoCountBadge" class="undo-count-badge" aria-hidden="true"></span>
        </button>
        <button id="undoAllBtn" class="undo-chip undo-chip-all" type="button" aria-label="Undo all tracked AI changes" style="display:none;">
          <svg class="undo-chip-icon" width="14" height="14" viewBox="0 0 16 16" fill="none" stroke="currentColor"
               stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
            <path d="M2 6V2.5h3.5"/>
            <path d="M2 6a6 6 0 1 0 1.8-4.2"/>
            <path d="M11 11.5l1 1 1.5-1.5"/>
          </svg>
          <span>Undo all</span>
        </button>
        <button id="settingsBtn" class="gear-btn" type="button" aria-label="Open AI settings">
          <svg width="18" height="18" viewBox="0 0 16 16" fill="none" stroke="currentColor"
               stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
            <circle cx="8" cy="8" r="2"/>
            <path d="M8 1.2v1.6 M8 13.2v1.6 M14.8 8h-1.6 M2.8 8h-1.6 M12.8 3.2l-1.1 1.1 M4.3 11.7l-1.1 1.1 M12.8 12.8l-1.1-1.1 M4.3 4.3l-1.1-1.1"/>
          </svg>
        </button>
      </div>
    </div>
  </header>

  <nav id="stepper"></nav>

  <div id="main">
    <div id="main-left"></div>
    <div id="main-right"></div>
  </div>

  <footer id="app-footer">
    <div class="footer-actions">
      <button id="exportBtn" class="btn-outline" title="Save your work as a .canvas file you can re-open later, back up, or share with a colleague.">
        <svg class="footer-btn-icon" width="13" height="13" viewBox="0 0 16 16" fill="none" stroke="currentColor"
             stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
          <path d="M8 1.5v9"/><path d="M4.5 7L8 10.5 11.5 7"/><path d="M2 13h12"/>
        </svg>
        Save to file
      </button>
      <button id="openFileBtn" class="btn-outline" title="Load a previously saved .canvas file. Your work replaces whatever's currently on screen.">
        <svg class="footer-btn-icon" width="13" height="13" viewBox="0 0 16 16" fill="none" stroke="currentColor"
             stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
          <path d="M8 10.5v-9"/><path d="M4.5 5L8 1.5 11.5 5"/><path d="M2 13h12"/>
        </svg>
        Open file
      </button>
      <input id="openFileInput" type="file" accept=".canvas,application/vnd.delltech.canvas+json,application/json" style="display:none" />
      <!-- Import data button (Dell internal LLM workflow). -->
      <button id="importDataBtn" data-import-data-btn class="btn-outline" title="Import data from a source file via the Dell internal LLM workflow. Step 1 downloads context-aware instructions; Step 2 imports the LLM's JSON response.">
        <svg class="footer-btn-icon" width="13" height="13" viewBox="0 0 16 16" fill="none" stroke="currentColor"
             stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
          <path d="M2 11v2a1 1 0 0 0 1 1h10a1 1 0 0 0 1-1v-2"/>
          <path d="M8 2v8"/>
          <path d="M4.5 6.5L8 10l3.5-3.5"/>
        </svg>
        Import data
      </button>
      <input id="importJsonInput" type="file" accept=".json,.txt,application/json,text/plain" style="display:none" />
      <button id="demoBtn" class="btn-ghost">
        <!-- Play-circle icon (triangle inside circle) for "start the demo". -->
        <svg class="footer-btn-icon" width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor"
             stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
          <circle cx="12" cy="12" r="10"/>
          <polygon points="10 8 16 12 10 16 10 8"/>
        </svg>
        Load demo
      </button>
      <button id="newSessionBtn" class="btn-ghost">
        <svg class="footer-btn-icon" width="13" height="13" viewBox="0 0 16 16" fill="none" stroke="currentColor"
             stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
          <path d="M8 3v10"/><path d="M3 8h10"/>
        </svg>
        New session
      </button>
      <button id="clearAllBtn" class="btn-ghost footer-btn-destructive" title="Wipe every dell_discovery_* and ai_* localStorage key and reload as a brand-new user.">
        <svg class="footer-btn-icon" width="13" height="13" viewBox="0 0 16 16" fill="none" stroke="currentColor"
             stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
          <path d="M3 4h10"/>
          <path d="M5 4V3a1.5 1.5 0 0 1 1.5-1.5h3A1.5 1.5 0 0 1 11 3v1"/>
          <path d="M4 4l1 9.2a1.5 1.5 0 0 0 1.5 1.3h3a1.5 1.5 0 0 0 1.5-1.3L12 4"/>
        </svg>
        Clear all data
      </button>
    </div>
    <div class="footer-hint">Auto-saved to browser · data stays on your device</div>
    <div class="footer-version-capsule" id="appVersionChip" title="Dell Discovery Canvas build version (separate from session schema version)">Canvas v.</div>
  </footer>

  <script type="module" src="app.js"></script>
</body>
</html>
