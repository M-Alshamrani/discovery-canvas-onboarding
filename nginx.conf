# Dell Discovery Canvas — nginx site config.
# Mounted at /etc/nginx/conf.d/dell-discovery.conf inside the image.

# AVIF + correct ESM MIME aren't in the default mime.types on alpine.
types {
  application/javascript    js mjs;
  image/avif                avif;
  text/css                  css;
  text/html                 html;
  text/plain                txt md;
  image/svg+xml             svg;
  image/png                 png;
  image/jpeg                jpg jpeg;
  image/x-icon              ico;
  application/json          json;
  # v2.4.10 · PWA manifest + .canvas file type MIME (used by file_handlers).
  application/manifest+json              webmanifest;
  application/vnd.delltech.canvas+json   canvas;
  font/woff2                woff2;
  font/woff                 woff;
}

server {
  listen       80 default_server;
  server_name  _;

  root  /usr/share/nginx/html;
  index index.html;

  # Security headers at server scope so they apply to every response,
  # including the internal rewrite of "/" -> "/index.html".
  # nginx's add_header inheritance is reset by any add_header in a child
  # location, so we deliberately use *only* `expires` for cache control
  # below (a separate directive that does NOT trigger the reset).
  add_header X-Content-Type-Options "nosniff" always;
  add_header X-Frame-Options        "DENY" always;
  add_header Referrer-Policy        "no-referrer" always;
  add_header Permissions-Policy     "camera=(), microphone=(), geolocation=()" always;
  add_header Content-Security-Policy "default-src 'self'; script-src 'self' 'unsafe-inline'; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src 'self' https://fonts.gstatic.com; img-src 'self' data: https://i.dell.com; connect-src 'self'; frame-ancestors 'none'; base-uri 'self'" always;

  # Default cache policy for static assets — overridden per location below.
  expires 5m;

  # Optional Basic auth — populated by docker-entrypoint.d/40-setup-auth.sh
  # at container start when AUTH_USERNAME + AUTH_PASSWORD env vars are set.
  # When env vars are unset, the include is empty and auth stays off.
  include /etc/nginx/snippets/auth.conf;

  # LLM reverse-proxy locations — populated by
  # docker-entrypoint.d/45-setup-llm-proxy.sh at container start.
  # Defines /api/llm/local/, /api/llm/anthropic/, /api/llm/gemini/ so the
  # browser can reach LLM endpoints without CORS.
  include /etc/nginx/snippets/llm-proxy.conf;

  # Cheap liveness probe used by HEALTHCHECK and any external monitor.
  # Always reachable without auth so the healthcheck doesn't need creds.
  location = /health {
    auth_basic off;
    access_log off;
    default_type text/plain;
    return 200 "ok\n";
  }

  # Block access to dotfiles (e.g. .git if it ever leaks into the image).
  location ~ /\. {
    deny all;
    return 404;
  }

  # index.html must never be cached — single-page entry, drives module graph.
  # `expires -1` emits Cache-Control: no-cache (force revalidation per request).
  location = /index.html {
    expires -1;
  }

  # v2.4.5.1 — JS / CSS modules are the app graph and ship alongside
  # every release. A 5-minute browser cache on ES modules means users
  # can silently run stale code against a freshly-updated index.html,
  # causing "missing export" SyntaxErrors for half an hour after every
  # push. Force revalidation per request — ETag handles actual
  # conditional loads so the cost is negligible in practice.
  location ~* \.(?:js|mjs|css)$ {
    expires -1;
  }

  # robots.txt — keep noindex behaviour from the safety-net commit.
  location = /robots.txt {
    expires 1d;
  }

  # Catch-all for the static app payload.
  location / {
    try_files $uri $uri/ =404;
  }

  # Compress text payloads (CSS is 62KB, app.js + modules add up).
  gzip            on;
  gzip_vary       on;
  gzip_min_length 1024;
  gzip_types      text/plain text/css application/javascript application/json image/svg+xml;

  # Quiet the access log for favicons.
  location = /favicon.ico { log_not_found off; access_log off; }
}
