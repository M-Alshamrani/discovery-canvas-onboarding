<?xml version="1.0" encoding="UTF-8"?>
<!-- Dell Discovery Canvas · v2.4.10 · file-type icon for .canvas
     Intentionally simple + readable at 16×16 (tiny OS icons) and
     192×192 (app drawer). Rendered at any size the OS asks for. -->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" role="img" aria-label="Dell Discovery Canvas file">
  <!-- Rounded square brand plate in Dell blue. -->
  <rect x="0" y="0" width="512" height="512" rx="96" ry="96" fill="#0078D4"/>
  <!-- Abstract "canvas" — a white plane with three ascending rows hinting
       at the current → desired → roadmap progression. -->
  <g fill="#FFFFFF">
    <rect x="96"  y="112" width="320" height="44" rx="10" ry="10" opacity="0.95"/>
    <rect x="96"  y="188" width="256" height="44" rx="10" ry="10" opacity="0.80"/>
    <rect x="96"  y="264" width="192" height="44" rx="10" ry="10" opacity="0.65"/>
    <!-- Upward trending chevron evoking "roadmap". -->
    <path d="M 96 400 L 200 328 L 296 376 L 416 280" stroke="#FFFFFF" stroke-width="20" stroke-linecap="round" stroke-linejoin="round" fill="none" opacity="0.95"/>
    <!-- End-of-path target dot. -->
    <circle cx="416" cy="280" r="16" fill="#FFFFFF"/>
  </g>
</svg>
